name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install quality tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang clang-format clang-tidy cppcheck

      - name: Format check
        run: find src include tests -type f \( -name '*.c' -o -name '*.h' \) -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Code health budget
        run: bash scripts/check-code-health.sh

      - name: Configure compile database
        run: CC=clang cmake -S . -B build -G Ninja -DFTR_ENABLE_STRICT=ON -DCMAKE_BUILD_TYPE=Debug

      - name: clang-tidy
        run: find src -type f -name '*.c' -print0 | xargs -0 clang-tidy -p build

      - name: cppcheck
        run: cppcheck --enable=warning,style,performance,portability --error-exitcode=1 --std=c11 --suppress=missingIncludeSystem -I include src include

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang

      - name: Configure with sanitizers
        run: CC=clang cmake -S . -B build -G Ninja -DFTR_ENABLE_SANITIZERS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
