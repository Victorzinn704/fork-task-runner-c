name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build

      - uses: github/codeql-action/analyze@v3

  valgrind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build valgrind

      - name: Build
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug && cmake --build build

      - name: Memcheck unit test
        run: valgrind --leak-check=full --error-exitcode=1 ./build/test_structures
